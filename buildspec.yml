version: 0.2
#
# Pipeline buildspec. Triggered on every push to the tracked branch.
# Two responsibilities:
#   1. Reconcile infrastructure — call the platform orchestrator (which runs
#      `terraform apply`) on every build. Idempotent: a no-op apply is fast
#      (~30s of refresh+plan with no diff). Catches console-edit drift for
#      free, and means the developer never has to remember a separate
#      "redeploy infra" verb when capabilities flip.
#   2. Update the Lambda — package backend + frontend and call
#      `aws lambda update-function-code`.
#
# Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0 (arm64),
# matches Lambda Graviton arch so wheels with C extensions
# (psycopg, cryptography) load correctly when packed into the zip.
#
# Env vars injected by the platform's quickship module:
#   LAMBDA_FUNCTION_NAME      — target Lambda name
#   AWS_REGION                — region for the deploy call
#   PYTHON_RUNTIME            — informational; alignment with `runtime-versions` below
#   PLATFORM_PREFIX           — platform's name_prefix (= AWS profile, by convention)
#   APP_NAME                  — this app's name
#   ORCHESTRATOR_PROJECT      — CodeBuild project that runs terraform
#   ORCHESTRATOR_INPUT_BUCKET — S3 bucket the orchestrator reads from

phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 22
    commands:
      - echo "Build env Python $(python3 --version) Node $(node --version)"

  pre_build:
    commands:
      # ---- 1. Reconcile infrastructure via orchestrator -------------------
      # Skipped for non-primary envs (test/staging) where infra is owned by
      # the prod pipeline — see SKIP_ORCHESTRATOR_TRIGGER env var passed by
      # the platform module.
      - |
        if [ "${SKIP_ORCHESTRATOR_TRIGGER:-false}" = "true" ]; then
          echo "Skipping orchestrator (non-primary env, code-only deploy)"
        else
          REPO_URL=$(aws ssm get-parameter --name "/${PLATFORM_PREFIX}/_platform/app_owners/${APP_NAME}" --query Parameter.Value --output text)
          ZIP_KEY="${APP_NAME}-pipeline-${CODEBUILD_BUILD_NUMBER}.zip"
          echo "Staging source for orchestrator → s3://${ORCHESTRATOR_INPUT_BUCKET}/${ZIP_KEY}"
          (cd "$CODEBUILD_SRC_DIR" && zip -qr "/tmp/${ZIP_KEY}" . -x ".git/*" "node_modules/*" "frontend/node_modules/*" "frontend/dist/*" "build/*")
          aws s3 cp "/tmp/${ZIP_KEY}" "s3://${ORCHESTRATOR_INPUT_BUCKET}/${ZIP_KEY}" --quiet
          BUILD_ID=$(aws codebuild start-build \
            --project-name "${ORCHESTRATOR_PROJECT}" \
            --source-type-override S3 \
            --source-location-override "${ORCHESTRATOR_INPUT_BUCKET}/${ZIP_KEY}" \
            --environment-variables-override "name=MODE,value=apply" "name=REPO_URL,value=${REPO_URL}" \
            --query 'build.id' --output text)
          echo "Orchestrator build started: ${BUILD_ID}"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "${BUILD_ID}" --query 'builds[0].buildStatus' --output text)
            case "${STATUS}" in
              SUCCEEDED) echo "✓ orchestrator apply complete"; break ;;
              FAILED|FAULT|TIMED_OUT|STOPPED)
                echo "✗ orchestrator ${STATUS} — see /aws/codebuild/${ORCHESTRATOR_PROJECT}"
                exit 1 ;;
            esac
            sleep 10
          done
        fi

      # ---- 2. Prepare Lambda package directory ----------------------------
      - echo "Building ${LAMBDA_FUNCTION_NAME} runtime ${PYTHON_RUNTIME}"
      - mkdir -p build

  build:
    commands:
      # Backend dependencies + source. -t installs into build/ so they
      # land at zip root where Lambda imports from.
      - pip install --quiet --no-cache-dir -t build/ -r backend/requirements.txt
      - cp -r backend/app build/
      - cp backend/handler.py build/
      # Yoyo migrations live alongside backend/app and run on cold start
      # via db.apply_migrations(). Without this copy the migrations
      # directory is dropped from the Lambda zip and queries against
      # not-yet-migrated tables fail with UndefinedTable.
      - if [ -d backend/migrations ]; then cp -r backend/migrations build/; fi

      # Frontend build (skipped gracefully if frontend/ absent — keeps the
      # template usable for pure-API apps). `set -e` so npm errors surface
      # here instead of as a confusing "cp: no such file" two lines later.
      - |
        if [ -f frontend/package.json ]; then
          set -e
          cd frontend
          npm ci
          npm run build
          cd ..
          mkdir -p build/static
          cp -r frontend/dist/* build/static/
        else
          echo "No frontend/package.json — skipping frontend build"
        fi

      # Pack everything at zip root (no leading ./build/ prefix).
      - (cd build && zip -rq ../app.zip .)
      - echo "Built $(du -h app.zip | cut -f1) zip"

  post_build:
    commands:
      - echo "Deploying to Lambda ${LAMBDA_FUNCTION_NAME}"
      - aws lambda update-function-code --function-name "${LAMBDA_FUNCTION_NAME}" --zip-file fileb://app.zip --region "${AWS_REGION}" >/dev/null
      - aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}" --region "${AWS_REGION}"
      - echo "Deploy complete"

artifacts:
  files:
    - app.zip

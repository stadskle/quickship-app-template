# Local dev environment. `docker compose up` brings everything up:
#   - postgres on :5432 with the app's database+role pre-created
#   - backend (FastAPI/uvicorn) on :8000 with hot reload
#   - frontend (Vite) on :5173 with HMR; /api/* proxies to backend
#
# Source code is bind-mounted from host so edits are live without rebuild.
# node_modules and Postgres data live in named volumes (Docker-native FS,
# not the host bind mount) so they don't slow down macOS volume mounts.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: __APP_NAME__
      POSTGRES_USER: __APP_NAME__
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "__APP_NAME__"]
      interval: 2s
      timeout: 2s
      retries: 30

  backend:
    build: ./backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro # AWS credentials for Bedrock (real, not mocked)
    environment:
      DATABASE_URL: postgresql://__APP_NAME__:dev@postgres:5432/__APP_NAME__
      AWS_REGION: __AWS_REGION__
      AWS_DEFAULT_REGION: __AWS_REGION__
      AWS_PROFILE: __AWS_PROFILE__
      # Capability env vars below point at the per-app `-localdev` AWS
      # twins (DynamoDB tables and S3 bucket) provisioned alongside prod.
      # When set, kv.py / storage.py use real AWS via the dev's profile;
      # when unset (e.g. before /initialize ran), they fall back to local
      # SQLite / ./uploads/ for greenfield iteration.
__CAPABILITY_ENV_VARS__
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
